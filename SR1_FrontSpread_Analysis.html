const spreads = RAW.spreads;

// ── Helpers ──────────────────────────────────────────────────────────────────
const allYears = [2022,2023,2024,2025,2026];
const yearColors = {2022:'#60a5fa',2023:'#f59e0b',2024:'#a78bfa',2025:'#34d399',2026:'#fb7185'};

function getSpreadsByYear(yr) {
  return Object.keys(spreads).filter(k => spreads[k].year === yr).sort();
}

function buildSpreadList() {
  const container = document.getElementById('spreadList');
  container.innerHTML = '';
  allYears.forEach(yr => {
    const yrLabel = document.createElement('div');
    yrLabel.style.cssText = 'font-size:10px;color:#4b5563;font-weight:600;padding:6px 10px 2px;text-transform:uppercase;letter-spacing:0.5px;';
    yrLabel.textContent = yr;
    container.appendChild(yrLabel);
    getSpreadsByYear(yr).forEach(sp => {
      const btn = document.createElement('button');
      btn.className = 'spread-btn';
      btn.id = 'btn-' + sp;
      btn.textContent = sp;
      btn.onclick = () => showSpread(sp);
      container.appendChild(btn);
    });
  });
}

function clearActive() {
  document.querySelectorAll('.year-btn, .spread-btn').forEach(b => b.classList.remove('active'));
}

function statsFor(spData) {
  const vals = spData.data.map(r => r.s);
  const irs = spData.data.map(r => r.ir);
  return {
    min: Math.min(...vals).toFixed(1),
    max: Math.max(...vals).toFixed(1),
    first: vals[0].toFixed(1),
    last: vals[vals.length-1].toFixed(1),
    change: (vals[vals.length-1] - vals[0]).toFixed(1),
    irMin: Math.min(...irs).toFixed(4),
    irMax: Math.max(...irs).toFixed(4),
    sigCount: spData.data.filter(r => r.sig).length
  };
}

const chartInstances = {};
function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

// ── Overview ──────────────────────────────────────────────────────────────────
function showYearOverview() {
  clearActive();
  document.getElementById('btn-overview').classList.add('active');
  
  // Compute year-level stats
  const yearData = allYears.map(yr => {
    const sps = getSpreadsByYear(yr);
    if (!sps.length) return null;
    const allSpreadVals = sps.flatMap(sp => spreads[sp].data.map(r => r.s));
    const allIR = sps.flatMap(sp => spreads[sp].data.map(r => r.ir));
    const avgS = allSpreadVals.reduce((a,b)=>a+b,0)/allSpreadVals.length;
    const avgIR = allIR.reduce((a,b)=>a+b,0)/allIR.length;
    // Weekly corr
    const wkChanges = sps.flatMap(sp => spreads[sp].data.filter(r=>r.wkc!==null).map(r => ({sc:r.wkc, ir:r.ir})));
    return { yr, avgS: avgS.toFixed(2), avgIR: avgIR.toFixed(4), nSpreads: sps.length, wkChanges };
  }).filter(Boolean);

  const btn = document.getElementById('btn-' + yr);
  if (btn) btn.classList.add('active');
  
  const sps = getSpreadsByYear(yr);
  const allDates = [...new Set(sps.flatMap(sp => spreads[sp].data.map(r => r.d)))].sort();
  
  // Merge all spread + IR for the year
  const dateMap = {};
  sps.forEach(sp => {
    spreads[sp].data.forEach(r => {
      if (!dateMap[r.d]) dateMap[r.d] = { date: r.d, ir: r.ir };
      dateMap[r.d][sp] = r.s;
    });
  });
  const rows = Object.values(dateMap).sort((a,b) => a.date.localeCompare(b.date));
  
  const main = document.getElementById('mainContent');
  const spColors = ['#60a5fa','#4ade80','#f59e0b','#a78bfa','#f87171','#22d3ee'];
  
  main.innerHTML = `
    <div class="chart-container">
      <div class="chart-header">
        <div>
          <div class="chart-title">${yr} — All Front Spreads vs SR1 Rate</div>
          <div class="chart-sub">${sps.join(' · ')}</div>
        </div>
      </div>
      <div class="chart-wrap" style="height:320px;"><canvas id="yearChart"></canvas></div>
    </div>
    <div class="chart-container">
      <div class="chart-header"><div><div class="chart-title">Individual Spread Detail — ${yr}</div><div class="chart-sub">Click a spread in the sidebar for detailed view</div></div></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;">
        ${sps.map((sp,i) => `<div><div style="font-size:12px;font-weight:600;color:${spColors[i%spColors.length]};margin-bottom:8px;">${sp}</div><div style="position:relative;height:140px;"><canvas id="mini_${sp.replace('-','_')}"></canvas></div></div>`).join('')}
      </div>
    </div>
  `;

  // Main year chart
  destroyChart('year');
  const ctx = document.getElementById('yearChart').getContext('2d');
  const datasets = sps.map((sp,i) => ({
    label: sp,
    data: rows.map(r => r[sp] !== undefined ? r[sp] : null),
    borderColor: spColors[i%spColors.length],
    backgroundColor: 'transparent',
    borderWidth: 1.8,
    pointRadius: 0,
    tension: 0.2,
    spanGaps: true,
    yAxisID: 'y'
  }));
  datasets.push({
    label: 'SR1 Rate (%)',
    data: rows.map(r => r.ir),
    borderColor: '#f97316',
    backgroundColor: 'transparent',
    borderWidth: 2.5,
    pointRadius: 0,
    tension: 0.2,
    borderDash: [4,3],
    yAxisID: 'y2'
  });
  chartInstances['year'] = new Chart(ctx, {
    type: 'line',
    data: { labels: rows.map(r=>r.date), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 20 } }, tooltip: { mode: 'index', intersect: false } },
      scales: {
        x: { ticks: { color: '#718096', maxTicksLimit: 12, font: { size: 10 } }, grid: { color: '#1e2433' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e2433' }, title: { display:true, text:'Front Spread', color:'#718096', font:{ size:11 } } },
        y2: { position:'right', ticks: { color:'#f97316' }, grid:{ display:false }, title:{ display:true, text:'SR1 Rate (%)', color:'#f97316', font:{size:11} } }
      }
    }
  });
  
  // Mini charts
  sps.forEach((sp,i) => {
    const spData = spreads[sp].data;
    const canvasId = 'mini_' + sp.replace('-','_');
    destroyChart(canvasId);
    const ctx2 = document.getElementById(canvasId);
    if (!ctx2) return;
    chartInstances[canvasId] = new Chart(ctx2.getContext('2d'), {
      type: 'line',
      data: {
        labels: spData.map(r=>r.d),
        datasets: [
          { label:'Spread', data: spData.map(r=>r.s), borderColor: spColors[i%spColors.length], borderWidth:1.5, pointRadius:0, tension:0.2, yAxisID:'y' },
          { label:'SR1', data: spData.map(r=>r.ir), borderColor:'#f97316', borderWidth:1.5, pointRadius:0, tension:0.2, borderDash:[3,2], yAxisID:'y2' }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false} },
        scales:{
          x:{ ticks:{ display:false }, grid:{ color:'#1e2433' } },
          y:{ ticks:{ color:'#718096', font:{size:9}, maxTicksLimit:4 }, grid:{ color:'#1e2433' } },
          y2:{ position:'right', ticks:{ color:'#f97316', font:{size:9}, maxTicksLimit:4 }, grid:{ display:false } }
        }
      }
    });
  });
}

// ── Spread View ────────────────────────────────────────────────────────────────
function showSpread(sp) {
  clearActive();
  const btn = document.getElementById('btn-' + sp);
  if (btn) btn.classList.add('active');
  
  const spData = spreads[sp];
  const stats = statsFor(spData);
  const sigEvents = spData.data.filter(r => r.sig);
  
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="chart-container">
      <div class="chart-header">
        <div>
          <div class="chart-title">${sp}</div>
          <div class="chart-sub">Front Spread vs SR1 Interest Rate — ${spData.data[0].d} to ${spData.data[spData.data.length-1].d}</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Spread Start</div><div class="stat-value">${stats.first}</div></div>
        <div class="stat-card"><div class="stat-label">Spread End</div><div class="stat-value">${stats.last}</div></div>
        <div class="stat-card"><div class="stat-label">Net Change</div><div class="stat-value ${parseFloat(stats.change)>0?'pos':'neg'}">${parseFloat(stats.change)>0?'+':''}${stats.change}</div></div>
        <div class="stat-card"><div class="stat-label">SR1 Range (%)</div><div class="stat-value" style="font-size:14px;">${stats.irMin} – ${stats.irMax}</div></div>
        <div class="stat-card"><div class="stat-label">Sig. Move Days</div><div class="stat-value">${stats.sigCount}</div></div>
      </div>
      <div class="chart-wrap"><canvas id="spreadChart"></canvas></div>
    </div>
    ${sigEvents.length > 0 ? `
    <div class="events-section">
      <h3>⚡ Significant Weekly Move Events (${sp})</h3>
      <table class="event-table">
        <thead><tr><th>Date</th><th>Front Spread</th><th>Weekly Chg</th><th>SR1 Rate (%)</th><th>Direction</th></tr></thead>
        <tbody>
          ${sigEvents.map(r => `<tr>
            <td>${r.d}</td>
            <td>${r.s}</td>
            <td style="color:${r.wkc>0?'#4ade80':'#f87171'};">${r.wkc>0?'+':''}${r.wkc}</td>
            <td>${r.ir}</td>
            <td><span class="tag ${r.wkc>0?'tag-up':'tag-down'}">${r.wkc>0?'▲ Narrow':'▼ Widen'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;

  // Main spread chart with highlighted points
  destroyChart('spread');
  const ctx = document.getElementById('spreadChart').getContext('2d');
  const pointRadius = spData.data.map(r => r.sig ? 5 : 0);
  const pointBg = spData.data.map(r => r.sig ? (r.wkc > 0 ? '#4ade80' : '#f87171') : 'transparent');
  
  chartInstances['spread'] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: spData.data.map(r => r.d),
      datasets: [
        {
          label: 'Front Spread',
          data: spData.data.map(r => r.s),
          borderColor: '#60a5fa',
          backgroundColor: 'rgba(96,165,250,0.08)',
          fill: true,
          borderWidth: 2,
          pointRadius,
          pointBackgroundColor: pointBg,
          pointBorderColor: pointBg,
          tension: 0.2,
          yAxisID: 'y'
        },
        {
          label: 'SR1 Rate (%)',
          data: spData.data.map(r => r.ir),
          borderColor: '#f97316',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.2,
          borderDash: [5, 3],
          yAxisID: 'y2'
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 12 } } },
        tooltip: { mode: 'index', intersect: false,
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + ctx.raw
          }
        }
      },
      scales: {
        x: { ticks: { color: '#718096', maxTicksLimit: 10, font: { size: 10 } }, grid: { color: '#1e2433' } },
        y: {
          ticks: { color: '#60a5fa' },
          grid: { color: '#1e2433' },
          title: { display: true, text: 'Front Spread', color: '#60a5fa', font: { size: 11 } }
        },
        y2: {
          position: 'right',
          ticks: { color: '#f97316' },
          grid: { display: false },
          title: { display: true, text: 'SR1 Rate (%)', color: '#f97316', font: { size: 11 } }
        }
      }
    }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildSpreadList();
showYearOverview();
</script>
